<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cieślak Family Birthdays</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background-color: #f4f4f9; }
        .birthday-card { background: white; padding: 20px; margin: 10px auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; }
        .days-left { font-weight: bold; color: #e63946; }
        .turning-age { color: #457b9d; font-style: italic; margin-bottom: 10px; }

        /* The Animated Birthday Cake CSS */
        #cake-container {
            position: relative;
            margin: 0 auto;
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }

        #cake-container::after {
            content: "🎂";
            font-size: 5rem;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes blink {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        #cake-container .flame {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 20px;
            background-color: orange;
            border-radius: 50% / 30%;
            animation: blink 0.5s infinite linear;
        }

    </style>
</head>
<body>

    <div id="cake-container">
        <div class="flame"></div>
    </div>

    <h1>Cieślak Family Birthdays</h1>
    <div id="birthday-list"></div>

    <script>
        const children = [
            { name: "Jan Cieślak", dob: "2023-03-17" },
            { name: "Jakub Cieślak", dob: "2020-05-03" },
            { name: "Julia Cieślak", dob: "2017-06-11" },
            { name: "Pola Cieślak", dob: "2012-10-06" },
            { name: "Anna Cieślak", dob: "1986-02-06" },
            { name: "Rafał Cieślak", dob: "1984-12-20" }
        ];

        function getBirthdayInfo(dob) {
            const now = new Date();
            const birthDate = new Date(dob);
            let nextYear = now.getFullYear();
            
            let nextBirthday = new Date(nextYear, birthDate.getMonth(), birthDate.getDate());

            if (now > nextBirthday) {
                nextYear++;
                nextBirthday.setFullYear(nextYear);
            }

            const diff = nextBirthday - now;
            const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
            
            const ageTurning = nextYear - birthDate.getFullYear();

            return { daysLeft, ageTurning };
        }

        const listDiv = document.getElementById('birthday-list');
        
        children.forEach(child => {
            const info = getBirthdayInfo(child.dob);
            const card = document.createElement('div');
            card.className = 'birthday-card';
            card.innerHTML = `
                <h3>${child.name}</h3>
                <p>Birthday: ${child.dob}</p>
                <p class="turning-age">Will be turning <strong>${info.ageTurning}</strong> years old!</p>
                <p class="days-left">${info.daysLeft} days until next birthday!</p>
            `;
            listDiv.appendChild(card);
        });
    </script>

</body>
</html>
