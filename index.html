<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cieślak Family Birthdays</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .birthday-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .birthday-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        /* Animated Flame */
        .flame {
            width: 12px;
            height: 20px;
            background: linear-gradient(to bottom, #ff4d00, #ffcc00);
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            animation: flicker 0.1s infinite alternate;
            filter: blur(1px);
        }

        @keyframes flicker {
            0% { transform: translateX(-50%) scale(1); opacity: 0.9; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 1; }
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            z-index: 1000;
            top: -10px;
            pointer-events: none;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- Top Spacing -->
    <div class="h-16 md:h-24"></div>

    <div class="max-w-2xl mx-auto">
        <!-- Header & Sound Button -->
        <div class="text-center mb-10">
            <div class="relative inline-block mb-4">
                <div class="flame"></div>
                <span class="text-6xl" role="img" aria-label="cake">🎂</span>
            </div>
            
            <h1 class="text-4xl font-bold text-slate-800 mb-6">Cieślak Family Birthdays</h1>
            
            <button id="party-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform active:scale-95 transition-all flex items-center justify-center mx-auto gap-2">
                <span>🎉</span> Start the Party!
            </button>
            <p class="text-slate-500 text-sm mt-3">(Click for sound and confetti)</p>
        </div>

        <!-- Birthday List Container -->
        <div id="birthday-list" class="grid gap-4">
            <!-- Cards will be injected here -->
        </div>
    </div>

    <!-- Bottom Spacing -->
    <div class="h-20"></div>

    <script>
        // Data
        const family = [
            { name: "Jan Cieślak", dob: "2023-03-17" },
            { name: "Jakub Cieślak", dob: "2020-05-03" },
            { name: "Julia Cieślak", dob: "2017-06-11" },
            { name: "Pola Cieślak", dob: "2012-10-06" },
            { name: "Anna Cieślak", dob: "1986-02-06" },
            { name: "Rafał Cieślak", dob: "1984-12-20" }
        ];

        function getBirthdayInfo(dob) {
            const now = new Date();
            now.setHours(0, 0, 0, 0); 
            
            const birthDate = new Date(dob);
            let nextYear = now.getFullYear();
            
            let nextBirthday = new Date(nextYear, birthDate.getMonth(), birthDate.getDate());

            if (now > nextBirthday) {
                nextYear++;
                nextBirthday.setFullYear(nextYear);
            }

            const diff = nextBirthday - now;
            const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
            const ageTurning = nextYear - birthDate.getFullYear();

            return { daysLeft, ageTurning, isToday: daysLeft === 0 };
        }

        const listDiv = document.getElementById('birthday-list');
        
        const sortedFamily = [...family].sort((a, b) => {
            return getBirthdayInfo(a.dob).daysLeft - getBirthdayInfo(b.dob).daysLeft;
        });

        sortedFamily.forEach(person => {
            const info = getBirthdayInfo(person.dob);
            const card = document.createElement('div');
            
            const isToday = info.isToday;
            
            card.className = `birthday-card p-6 rounded-xl border-2 transition-all ${
                isToday ? 'bg-yellow-50 border-yellow-400 shadow-xl scale-105' : 'bg-white border-slate-100 shadow-sm'
            }`;
            
            card.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <h3 class="text-xl font-bold text-slate-800">${person.name} ${isToday ? '🎂' : ''}</h3>
                        <p class="text-slate-500 text-sm">Born: ${new Date(person.dob).toLocaleDateString('pl-PL')}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xs font-bold uppercase tracking-wider text-indigo-500">Turning</span>
                        <div class="text-2xl font-black text-slate-900">${info.ageTurning}</div>
                    </div>
                </div>
                
                <div class="mt-4 pt-4 border-t border-slate-50">
                    <p class="${isToday ? 'text-orange-600 font-black text-lg' : 'text-slate-700 font-medium'}">
                        ${isToday ? 'Happy Birthday! Today is the day!' : info.daysLeft + ' days to go'}
                    </p>
                </div>
            `;
            listDiv.appendChild(card);
        });

        const partyBtn = document.getElementById('party-btn');

        function playChime() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const notes = [523.25, 659.25, 783.99, 1046.50]; 
                
                notes.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.1));
                    
                    gain.gain.setValueAtTime(0.2, ctx.currentTime + (i * 0.1));
                    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (i * 0.1) + 0.5);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    
                    osc.start(ctx.currentTime + (i * 0.1));
                    osc.stop(ctx.currentTime + (i * 0.1) + 0.5);
                });
            } catch (e) {
                console.error("Audio failed to play", e);
            }
        }

        function burstConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 60%)`;
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                document.body.appendChild(confetti);

                const animation = confetti.animate([
                    { top: '-10px', opacity: 1, transform: `rotate(0deg) translateX(0)` },
                    { top: '100vh', opacity: 0, transform: `rotate(${Math.random() * 1000}deg) translateX(${Math.random() * 100 - 50}px)` }
                ], {
                    duration: 2000 + Math.random() * 3000,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });

                animation.onfinish = () => confetti.remove();
            }
        }

        partyBtn.addEventListener('click', () => {
            playChime();
            burstConfetti();
        });
    </script>

</body>
</html>
